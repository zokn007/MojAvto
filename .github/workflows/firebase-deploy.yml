name: Firebase production deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prenesi datoteke
        uses: actions/checkout@v4

      - name: Prijava v Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Namesti Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Namesti Firebase CLI
        run: npm install --global firebase-tools

      - name: Preveri prijavo in projekt
        shell: bash
        run: |
          test -f "$GOOGLE_APPLICATION_CREDENTIALS"
          PROJECT_ID=$(node -p "require(process.env.GOOGLE_APPLICATION_CREDENTIALS).project_id")
          test -n "$PROJECT_ID"
          echo "FIREBASE_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "Firebase projekt: $PROJECT_ID"
          firebase projects:list

      - name: Objavi Hosting in Firestore pravila
        run: firebase deploy --only hosting,firestore:rules --project "$FIREBASE_PROJECT_ID" --non-interactive
